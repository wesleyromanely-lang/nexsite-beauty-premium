<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexsite Admin</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<div>

<h1>NEXSITE</h1>

<p>Painel Administrativo</p>

</div>

<button id="btnSair">

<i class="fa-solid fa-right-from-bracket"></i>

Sair

</button>

</header>


<main>

<div class="card">

<h2>💰 Faturamento</h2>

<p id="faturamentoTotal">

R$ 0,00

</p>

</div>


<div class="card">

<h2>📄 Em andamento</h2>

<p id="projetosAndamento">

0

</p>

</div>


<div class="card">

<h2>✅ Entregues</h2>

<p id="projetosEntregues">

0

</p>

</div>


<div class="card">

<h2>⏳ Próximos do prazo</h2>

<p id="projetosPrazo">

0

</p>

</div>

</main>


<section class="cadastro">

<h2>Novo Projeto</h2>

<div class="campo">

<label>

<i class="fa-solid fa-user"></i>

Nome do Cliente

</label>

<input
type="text"
id="cliente"
placeholder="Ex.: Toda Bella Studio">

</div>


<div class="campo">

<label>

<i class="fa-brands fa-whatsapp"></i>

WhatsApp

</label>

<input
type="text"
id="telefone"
placeholder="(11) 99999-9999">

</div>


<div class="campo">

<label>

<i class="fa-solid fa-money-bill-wave"></i>

Valor do Site

</label>

<input
type="number"
id="valor"
value="180">

</div>


<div class="campo">

<label>

<i class="fa-solid fa-note-sticky"></i>

Observações

</label>

<textarea
id="observacoes"
placeholder="Ex.: Cliente enviará a logo">
</textarea>

</div>


<button id="btnSalvar">

<i class="fa-solid fa-floppy-disk"></i>

Salvar Projeto

</button>

</section>


<section class="agendamentos">

<h2>Projetos</h2>

<table>

<thead>

<tr>

<th>Cliente</th>

<th>Telefone</th>

<th>Valor</th>

<th>Venda</th>

<th>Entrega</th>

<th>Status</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="listaProjetos">

</tbody>

</table>

</section>


<script type="module" src="js/admin.js"></script>

</body>

</html>
