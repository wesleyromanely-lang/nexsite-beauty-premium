<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexsite Admin</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div>

<h1>NEXSITE</h1>

<p>Painel Administrativo</p>

</div>

<button id="btnSair">

Sair

</button>

</header>


<main>

<div class="card">

<h2>💰 Faturamento</h2>

<p id="faturamentoTotal">

R$ 0,00

</p>

</div>


<div class="card">

<h2>📄 Em andamento</h2>

<p id="projetosAndamento">

0

</p>

</div>


<div class="card">

<h2>✅ Entregues</h2>

<p id="projetosEntregues">

0

</p>

</div>


<div class="card">

<h2>⏳ Próximos do prazo</h2>

<p id="projetosPrazo">

0

</p>

</div>

</main>


<section class="cadastro">

<h2>Novo Projeto</h2>

<input
type="text"
id="cliente"
placeholder="Nome do cliente">


<input
type="text"
id="telefone"
placeholder="WhatsApp">


<input
type="number"
id="valor"
value="180"
placeholder="Valor do site">


<textarea
id="observacoes"
placeholder="Observações">
</textarea>


<button id="btnSalvar">

Salvar Projeto

</button>

</section>


<section class="agendamentos">

<h2>Projetos</h2>

<table>

<thead>

<tr>

<th>Cliente</th>

<th>Telefone</th>

<th>Valor</th>

<th>Venda</th>

<th>Entrega</th>

<th>Status</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="listaProjetos">

</tbody>

</table>

</section>


<script type="module" src="js/admin.js"></script>

</body>

</html>
